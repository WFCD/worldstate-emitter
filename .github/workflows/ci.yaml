name: Actions
on:
  pull_request:
    branches:
      - master
      - main

jobs:
  install:
    name: Install
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc
      - run: |
          npm ci
          npm install --no-save warframe-worldstate-parser@^5.x warframe-worldstate-data@^3.x winston@^3
      - uses: actions/cache/save@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            ./node_modules/**/*
          key: node-ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  lint:
    needs: install
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - name: Use Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc
      - uses: actions/cache/restore@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            ./node_modules/**/*
          key: node-ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
      - name: Run linters
        run: npm run lint
      - name: Run commitlint
        run: npx commitlint --from ${{ github.event.pull_request.head.sha }}~${{ github.event.pull_request.commits }} --to ${{ github.event.pull_request.head.sha }} --verbose
  build:
    needs: install
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Use Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc
      - uses: actions/cache/restore@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            ./node_modules/**/*
          key: node-ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
      - name: Build
        run: npm run build
  test:
    name: Test
    runs-on: ubuntu-latest
    needs: [lint, build]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc
      - name: Install Deps
        run: |
          npm ci
          npm install --no-save warframe-worldstate-parser@^5 warframe-worldstate-data@^3 winston@^3
      - run: npm test
        env:
          CI: true
          parallel: true
  docs:
    needs: build
    name: Build Documentation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc
      - name: Install dependencies
        run: |
          npm ci
          npm install --no-save warframe-worldstate-parser@^5.x warframe-worldstate-data@^3.x winston@^3
      - name: Build documentation
        run: npm run build:docs
